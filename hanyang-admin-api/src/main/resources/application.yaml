spring:
  application:
    name: hanyang-admin-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import:
      - optional:classpath:/application-core.yaml

admin:
  auth:
    jwt:
      secret: ${ADMIN_JWT_SECRET}
      expiration-ms: ${ADMIN_JWT_EXPIRATION:3600000}
    accounts:
      - username: ${ADMIN_ID}
        password: ${ADMIN_PASSWORD}

cors:
  allowed-origins: https://hanyang.life,https://admin.hanyang.life

server:
  port: 8081
  forward-headers-strategy: native
