user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # HTTP(80) 요청 ➔ HTTPS(443)로 강제 리다이렉트
    server {
        listen 80;
        server_name api.hanyang.life admin-api.hanyang.life;

        # Let's Encrypt 인증서 갱신용 경로 열어두기
        location ~/.well-known/acme-challenge/ {
            allow all;
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 1. User API (HTTPS: 443) 설정
    server {
        listen 443 ssl;
        server_name api.hanyang.life;

        # 발급받은 Let's Encrypt 인증서 경로 지정 (init-letsencrypt 스크립트 기준)
        ssl_certificate /etc/letsencrypt/live/api.hanyang.life/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.hanyang.life/privkey.pem;

        # 보안 옵션 로드
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://hanyang-user-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. Admin API (HTTPS: 443) 설정
    server {
        listen 443 ssl;
        server_name admin-api.hanyang.life;

        # 동일한 라이브 도메인 그룹 인증서 공유
        ssl_certificate /etc/letsencrypt/live/api.hanyang.life/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.hanyang.life/privkey.pem;

        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://hanyang-admin-api:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
