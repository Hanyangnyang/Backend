user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 1. User API (api.hanyang.life) 설정
    server {
        listen 80;
        server_name api.hanyang.life;

        # Let's Encrypt 인증서 갱신용 경로 열어두기
        location ~/.well-known/acme-challenge/ {
            allow all;
            root /var/www/certbot;
        }

        # 기본 요청은 도커 컨테이너 내부 네트워크의 user-api:8080 으로 리다이렉트
        location / {
            proxy_pass http://hanyang-user-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. Admin API (admin-api.hanyang.life) 설정
    server {
        listen 80;
        server_name admin-api.hanyang.life;

        location ~/.well-known/acme-challenge/ {
            allow all;
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://hanyang-admin-api:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
