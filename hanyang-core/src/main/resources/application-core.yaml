spring:
  servlet:
    multipart:
      max-file-size: 5MB      # 개별 파일 최대 용량 제한
      max-request-size: 5MB   # 전체 요청 최대 용량 제한

  datasource:
    url: jdbc:postgresql://${SUPABASE_DB_HOST}:5432/postgres?stringtype=unspecified
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 3  # 로컬 개발 환경에서 Supabase Session Mode 연결 고갈 방지를 위해 3으로 축소
      minimum-idle: 1       # 최소 대기 커넥션도 1로 축소
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

aws:
  s3:
    endpoint: ${SUPABASE_S3_ENDPOINT}
    access-key: ${SUPABASE_S3_ACCESS_KEY}
    secret-key: ${SUPABASE_S3_SECRET_KEY}
    region: ap-northeast-2
